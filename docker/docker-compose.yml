services:
  haravan-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: haravan-mcp
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    command:
      - node
      - dist/cli.js
      - mcp
      - --mode
      - http
      - --port
      - "3000"
      - --tools
      - all
      - --server-api-key
      - ${MCP_SERVER_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
