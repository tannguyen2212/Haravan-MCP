services:
  haravan-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: haravan-mcp
    ports:
      - "4567:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ngrok:
    image: ngrok/ngrok:latest
    container_name: haravan-mcp-ngrok
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: http haravan-mcp:3000
    ports:
      - "4040:4040"
    depends_on:
      haravan-mcp:
        condition: service_healthy
    restart: unless-stopped
